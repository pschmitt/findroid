name: Release (latest)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release-latest:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          # Exact patch pin (not a floating '21') so the toolchain that produces a release is
          # reproducible run-to-run instead of silently drifting to whatever Temurin 21.x build
          # happens to be current when the workflow executes - see REPRODUCIBLE_BUILDS.md. This is
          # Temurin's own patch numbering, which lags nixpkgs' OpenJDK slightly - it does not need
          # to match the Nix dev shell's JDK patch (21.0.12) exactly, see the "Known gaps" section.
          java-version: '21.0.11'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode CI signing keystore
        id: ci_keystore
        uses: timheuer/base64-to-file@v2
        with:
          fileName: 'findroid-ci.jks'
          encodedString: ${{ secrets.CI_KEYSTORE_BASE64 }}

      - name: Compute git revision
        id: git_revision
        run: echo "value=$(git describe --always --abbrev=12 --dirty)" >> "$GITHUB_OUTPUT"

      - name: Build debug and release APKs
        # Scoped to the app modules specifically (not a bare assembleRelease) - building every
        # library module's standalone release AAR pulls in verifyReleaseResources, which fails on
        # ?attr/colorControlNormal lookups that only resolve inside a themed app context.
        run: >
          ./gradlew :app:phone:assembleDebug :app:phone:assembleRelease
          :app:tv:assembleDebug :app:tv:assembleRelease --stacktrace --build-cache
        env:
          CI_KEYSTORE_PATH: ${{ steps.ci_keystore.outputs.filePath }}
          CI_KEYSTORE_PASSWORD: ${{ secrets.CI_KEYSTORE_PASSWORD }}
          CI_KEY_ALIAS: ${{ secrets.CI_KEY_ALIAS }}
          CI_KEY_PASSWORD: ${{ secrets.CI_KEY_PASSWORD }}
          GIT_REVISION: ${{ steps.git_revision.outputs.value }}

      - name: Verify embedded git revision
        # Confirms GIT_REVISION (see app/phone and app/tv build.gradle.kts) actually made it into
        # the built artifact instead of silently falling back to "unknown" - the same check
        # `just build --release` runs locally, see justfile.
        run: |
          revision="${{ steps.git_revision.outputs.value }}"
          for apk in \
            app/phone/build/outputs/apk/libre/release/phone-libre-arm64-v8a-release.apk \
            app/tv/build/outputs/apk/libre/release/tv-libre-arm64-v8a-release.apk \
          ; do
            if ! unzip -p "$apk" 'classes*.dex' | strings | grep -Fx "$revision" >/dev/null; then
              echo "::error::$apk does not contain expected revision: $revision" >&2
              exit 1
            fi
          done

      - name: Collect and rename APKs
        id: apks
        run: |
          mkdir -p /tmp/findroid-plus-latest
          for apk in \
            app/phone/build/outputs/apk/libre/debug/phone-libre-arm64-v8a-debug.apk \
            app/phone/build/outputs/apk/libre/debug/phone-libre-armeabi-v7a-debug.apk \
            app/phone/build/outputs/apk/libre/debug/phone-libre-x86_64-debug.apk \
            app/phone/build/outputs/apk/libre/debug/phone-libre-x86-debug.apk \
            app/tv/build/outputs/apk/libre/debug/tv-libre-arm64-v8a-debug.apk \
            app/tv/build/outputs/apk/libre/debug/tv-libre-armeabi-v7a-debug.apk \
            app/tv/build/outputs/apk/libre/debug/tv-libre-x86_64-debug.apk \
            app/tv/build/outputs/apk/libre/debug/tv-libre-x86-debug.apk \
            app/phone/build/outputs/apk/libre/release/phone-libre-arm64-v8a-release.apk \
            app/phone/build/outputs/apk/libre/release/phone-libre-armeabi-v7a-release.apk \
            app/phone/build/outputs/apk/libre/release/phone-libre-x86_64-release.apk \
            app/phone/build/outputs/apk/libre/release/phone-libre-x86-release.apk \
            app/tv/build/outputs/apk/libre/release/tv-libre-arm64-v8a-release.apk \
            app/tv/build/outputs/apk/libre/release/tv-libre-armeabi-v7a-release.apk \
            app/tv/build/outputs/apk/libre/release/tv-libre-x86_64-release.apk \
            app/tv/build/outputs/apk/libre/release/tv-libre-x86-release.apk \
          ; do
            name="findroid-plus-latest-$(basename "$apk" | sed -E 's/^(phone|tv)-libre-/\1-/')"
            cp "$apk" "/tmp/findroid-plus-latest/$name"
          done
          echo "dir=/tmp/findroid-plus-latest" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        # Lets anyone who downloads a release asset verify it wasn't corrupted/tampered with in
        # transit, and gives a third party rebuilding from source (see REPRODUCIBLE_BUILDS.md) a
        # fixed value to diff their own output against.
        working-directory: ${{ steps.apks.outputs.dir }}
        run: sha256sum -- *.apk > SHA256SUMS

      - name: Move latest tag
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Record build time
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          body: |
            Automated build of the latest main (${{ github.sha }}), built ${{ steps.date.outputs.date }}. Not a stable release.

            Two variants are provided, both signed with the same CI key so upgrades between them work:
            - `*-debug.apk` — debuggable, uses the `dev.pschmitt.findroidplus.debug` applicationId, installs side by side with a Play Store install.
            - `*-release.apk` — minified/optimized like a real release build, but uses the same `dev.pschmitt.findroidplus` applicationId as the Play Store app. Installing it over an existing Play Store install will fail with a signature mismatch — uninstall that first.

            `SHA256SUMS` covers every APK above. Each APK also embeds this exact commit
            (`${{ github.sha }}`) as `BuildConfig.GIT_REVISION`, checkable via `About` in the app
            or by grepping the APK's dex - see [REPRODUCIBLE_BUILDS.md](https://github.com/pschmitt/findroidplus/blob/main/REPRODUCIBLE_BUILDS.md)
            for how to rebuild and verify this release yourself.
          files: ${{ steps.apks.outputs.dir }}/*
          prerelease: true
          make_latest: false

      - name: Vacuum stale release assets
        # action-gh-release above overwrites assets whose filenames match what we just
        # uploaded, but never removes ones left over from a previous run under a different
        # name (e.g. after an ABI/flavor list change). Delete anything attached to the
        # release that isn't one of the files from this run.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t expected < <(basename -a "${{ steps.apks.outputs.dir }}"/*)
          gh release view latest --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' |
            while IFS= read -r name; do
              keep=0
              for f in "${expected[@]}"; do
                [ "$name" = "$f" ] && keep=1 && break
              done
              if [ "$keep" -eq 0 ]; then
                echo "Deleting stale asset: $name"
                gh release delete-asset latest "$name" --repo "$GITHUB_REPOSITORY" -y
              fi
            done
