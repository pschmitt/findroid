name: Release (latest)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release-latest:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode CI signing keystore
        id: ci_keystore
        uses: timheuer/base64-to-file@v2
        with:
          fileName: 'findroid-ci.jks'
          encodedString: ${{ secrets.CI_KEYSTORE_BASE64 }}

      - name: Build debug and release APKs
        # Scoped to the app modules specifically (not a bare assembleRelease) - building every
        # library module's standalone release AAR pulls in verifyReleaseResources, which fails on
        # ?attr/colorControlNormal lookups that only resolve inside a themed app context.
        run: >
          ./gradlew :app:phone:assembleDebug :app:phone:assembleRelease
          :app:tv:assembleDebug :app:tv:assembleRelease --stacktrace --build-cache
        env:
          CI_KEYSTORE_PATH: ${{ steps.ci_keystore.outputs.filePath }}
          CI_KEYSTORE_PASSWORD: ${{ secrets.CI_KEYSTORE_PASSWORD }}
          CI_KEY_ALIAS: ${{ secrets.CI_KEY_ALIAS }}
          CI_KEY_PASSWORD: ${{ secrets.CI_KEY_PASSWORD }}

      - name: Collect and rename APKs
        id: apks
        run: |
          mkdir -p /tmp/findroid-plus-latest
          for apk in \
            app/phone/build/outputs/apk/libre/debug/phone-libre-arm64-v8a-debug.apk \
            app/phone/build/outputs/apk/libre/debug/phone-libre-armeabi-v7a-debug.apk \
            app/phone/build/outputs/apk/libre/debug/phone-libre-x86_64-debug.apk \
            app/phone/build/outputs/apk/libre/debug/phone-libre-x86-debug.apk \
            app/tv/build/outputs/apk/libre/debug/tv-libre-arm64-v8a-debug.apk \
            app/tv/build/outputs/apk/libre/debug/tv-libre-armeabi-v7a-debug.apk \
            app/tv/build/outputs/apk/libre/debug/tv-libre-x86_64-debug.apk \
            app/tv/build/outputs/apk/libre/debug/tv-libre-x86-debug.apk \
            app/phone/build/outputs/apk/libre/release/phone-libre-arm64-v8a-release.apk \
            app/phone/build/outputs/apk/libre/release/phone-libre-armeabi-v7a-release.apk \
            app/phone/build/outputs/apk/libre/release/phone-libre-x86_64-release.apk \
            app/phone/build/outputs/apk/libre/release/phone-libre-x86-release.apk \
            app/tv/build/outputs/apk/libre/release/tv-libre-arm64-v8a-release.apk \
            app/tv/build/outputs/apk/libre/release/tv-libre-armeabi-v7a-release.apk \
            app/tv/build/outputs/apk/libre/release/tv-libre-x86_64-release.apk \
            app/tv/build/outputs/apk/libre/release/tv-libre-x86-release.apk \
          ; do
            name="findroid-plus-latest-$(basename "$apk" | sed -E 's/^(phone|tv)-libre-/\1-/')"
            cp "$apk" "/tmp/findroid-plus-latest/$name"
          done
          echo "dir=/tmp/findroid-plus-latest" >> "$GITHUB_OUTPUT"

      - name: Move latest tag
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Record build time
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          body: |
            Automated build of the latest main (${{ github.sha }}), built ${{ steps.date.outputs.date }}. Not a stable release.

            Two variants are provided, both signed with the same CI key so upgrades between them work:
            - `*-debug.apk` — debuggable, uses the `dev.pschmitt.findroidplus.debug` applicationId, installs side by side with a Play Store install.
            - `*-release.apk` — minified/optimized like a real release build, but uses the same `dev.pschmitt.findroidplus` applicationId as the Play Store app. Installing it over an existing Play Store install will fail with a signature mismatch — uninstall that first.
          files: ${{ steps.apks.outputs.dir }}/*.apk
          prerelease: true
          make_latest: false
